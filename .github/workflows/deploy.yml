name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # permite lanzarlo manualmente desde la UI de GitHub

# Permisos necesarios para escribir en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Solo un deploy activo a la vez; cancela el anterior si hay uno en cola
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── 1. Build ──────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: soldmate-frontend/package-lock.json

      - name: Install dependencies
        working-directory: soldmate-frontend
        run: npm ci

      - name: Build (static export)
        working-directory: soldmate-frontend
        run: npm run build -w soldmate-next
        env:
          GITHUB_PAGES: "true"
          # URL del backend. Cambia esto por tu backend desplegado en producción.
          # Si no tienes backend público todavía, la app cargará con datos vacíos.
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'https://tu-backend.railway.app' }}

      # Evita que GitHub Pages procese los archivos con Jekyll
      # (necesario para que funcionen las rutas que empiezan con _)
      - name: Add .nojekyll
        run: touch soldmate-frontend/apps/next/out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: soldmate-frontend/apps/next/out

  # ── 2. Deploy ─────────────────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
