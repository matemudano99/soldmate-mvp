spring.application.name=soldmate-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Database (Local Docker or Supabase)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
soldmate.jwt.secret=${SOLDMATE_JWT_SECRET:cambia-esto-por-una-clave-muy-larga-min-32-chars}
soldmate.jwt.expiration=86400000

# Supabase Storage
soldmate.supabase.url=${SOLDMATE_SUPABASE_URL:https://placeholder.supabase.co}
soldmate.supabase.anon-key=${SOLDMATE_SUPABASE_ANON_KEY:placeholder-key}
soldmate.supabase.bucket=incidents
soldmate.seed.enabled=${SOLDMATE_SEED_ENABLED:false}

# Railway inyecta PORT automáticamente; localmente usamos 8080
server.port=${PORT:8080}
